<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALJ Cursos - Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#0D2137; --dark:#081929; --card:#112840;
  --teal:#00A99D; --amber:#F5A623; --white:#FFFFFF;
  --gray:#C8D6E0; --gray2:#7A9AB0; --red:#C0392B;
}
* { box-sizing:border-box; margin:0; padding:0; }
body {
  min-height:100vh;
  background: radial-gradient(ellipse at 15% 20%, rgba(0,169,157,0.18), transparent 50%),
              radial-gradient(ellipse at 85% 80%, rgba(245,166,35,0.12), transparent 55%),
              var(--dark);
  color:var(--white);
  font-family:'DM Sans',sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.panel {
  width:min(460px, 100%);
  background:var(--card);
  border:1px solid rgba(200,214,224,0.12);
  border-radius:14px;
  padding:28px;
  box-shadow:0 20px 50px rgba(0,0,0,0.35);
}
.badge {
  display:inline-block;
  font-size:11px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--teal);
  margin-bottom:14px;
}
h1 {
  font-family:'Syne',sans-serif;
  font-size:30px;
  line-height:1.1;
  margin-bottom:8px;
}
.subtitle {
  color:var(--gray);
  font-size:14px;
  margin-bottom:22px;
}
label {
  display:block;
  font-size:12px;
  color:var(--gray2);
  margin-bottom:6px;
  letter-spacing:.4px;
}
input {
  width:100%;
  background:#0B1D31;
  border:1px solid rgba(200,214,224,0.18);
  color:var(--white);
  border-radius:8px;
  padding:12px;
  margin-bottom:14px;
  outline:none;
}
input:focus { border-color:var(--teal); }
button {
  width:100%;
  border:none;
  border-radius:8px;
  padding:12px;
  background:var(--teal);
  color:var(--white);
  font-family:'Syne',sans-serif;
  font-size:14px;
  font-weight:700;
  cursor:pointer;
}
button:hover { background:#00c4b7; }
.msg {
  margin-top:12px;
  font-size:13px;
  min-height:18px;
}
.msg.error { color:#ff9c9c; }
.msg.ok { color:#93f0c4; }
.help {
  margin-top:16px;
  font-size:12px;
  color:var(--gray2);
  line-height:1.5;
}
.back {
  margin-top:14px;
  display:inline-block;
  color:var(--teal);
  text-decoration:none;
  font-size:13px;
}
.forgot-link {
  display:block;
  margin-top:10px;
  font-size:13px;
  color:var(--gray2);
  text-align:center;
  cursor:pointer;
  background:none;
  border:none;
  width:auto;
  padding:0;
  text-decoration:underline;
  font-family:'DM Sans',sans-serif;
}
.forgot-link:hover { color:var(--teal); background:none; }
.panel-fp {
  display:none;
}
.panel-fp.active {
  display:block;
}
.divider {
  border:none;
  border-top:1px solid rgba(200,214,224,0.10);
  margin:20px 0;
}
.back-login {
  display:inline-block;
  margin-top:8px;
  font-size:13px;
  color:var(--teal);
  cursor:pointer;
  background:none;
  border:none;
  width:auto;
  padding:0;
  font-family:'DM Sans',sans-serif;
}
.back-login:hover { background:none; text-decoration:underline; }
</style>
</head>
<body>
  <div class="panel">
    <div class="badge">Acesso ao curso</div>
    <h1>Entrar na plataforma</h1>
    <p class="subtitle">Use seu e-mail e senha para acessar as aulas.</p>

    <form id="login-form">
      <label for="email">E-mail</label>
      <input id="email" type="email" autocomplete="email" required>

      <label for="password">Senha</label>
      <input id="password" type="password" autocomplete="current-password" required>

      <button type="submit">Entrar</button>
      <div id="msg" class="msg"></div>
    </form>

    <!-- Painel de login -->
    <div id="panel-login">
      <button type="button" class="forgot-link" id="btn-forgot">Esqueci minha senha</button>
      <div class="help">Administrador inicial: admin@aljcursos.com.br</div>
    </div>

    <!-- Painel de recuperação de senha -->
    <div id="panel-fp" class="panel-fp">
      <hr class="divider">
      <div class="badge">Recuperar acesso</div>
      <h1 style="font-size:22px;margin-bottom:6px;">Esqueci minha senha</h1>
      <p class="subtitle">Informe seu e-mail e enviaremos sua senha.</p>
      <form id="fp-form">
        <label for="fp-email">E-mail cadastrado</label>
        <input id="fp-email" type="email" autocomplete="email" required placeholder="seu@email.com">
        <button type="submit" id="fp-btn">Enviar senha por e-mail</button>
        <div id="fp-msg" class="msg"></div>
      </form>
      <button type="button" class="back-login" id="btn-back-login">← Voltar para o login</button>
    </div>

    <a href="index-ifrs-19.html" class="back" id="back-link">Voltar para o índice</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="auth.js"></script>
  <script>
    // ─── Configuração EmailJS ────────────────────────────────────────────────
    // Crie conta gratuita em emailjs.com e preencha abaixo:
    var EMAILJS_PUBLIC_KEY   = 'SUA_PUBLIC_KEY';   // Account > API Keys
    var EMAILJS_SERVICE_ID   = 'SUA_SERVICE_ID';   // Email Services
    var EMAILJS_TEMPLATE_ID  = 'SUA_TEMPLATE_ID';  // Email Templates
    // Template precisa ter as variáveis: {{to_email}}, {{user_name}}, {{user_password}}
    // ────────────────────────────────────────────────────────────────────────

    (function () {
      if (EMAILJS_PUBLIC_KEY !== 'SUA_PUBLIC_KEY') {
        emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });
      }
    })();

    // ─── Login ───────────────────────────────────────────────────────────────
    const form = document.getElementById('login-form');
    const msg  = document.getElementById('msg');
    const params    = new URLSearchParams(window.location.search);
    const returnUrl = params.get('returnUrl') || 'index-ifrs-19.html';
    const fromUrl   = params.get('fromUrl');
    const backLink  = document.getElementById('back-link');
    let backTarget  = fromUrl || returnUrl;
    if (!backTarget || /^aula\d+\.html(\?.*)?$/i.test(backTarget)) {
      backTarget = 'index-ifrs-19.html';
    }
    if (backLink) backLink.href = backTarget;

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      msg.textContent = '';
      msg.className = 'msg';
      const email    = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const result   = window.CourseAuth.login(email, password);
      if (!result.ok) {
        msg.textContent = result.message;
        msg.className = 'msg error';
        return;
      }
      msg.textContent = 'Acesso liberado. Redirecionando...';
      msg.className = 'msg ok';
      setTimeout(function () { window.location.href = returnUrl; }, 300);
    });

    // ─── Esqueci minha senha ─────────────────────────────────────────────────
    const panelLogin = document.getElementById('panel-login');
    const panelFp    = document.getElementById('panel-fp');
    const fpForm     = document.getElementById('fp-form');
    const fpMsg      = document.getElementById('fp-msg');
    const fpBtn      = document.getElementById('fp-btn');

    document.getElementById('btn-forgot').addEventListener('click', function () {
      panelLogin.style.display = 'none';
      panelFp.classList.add('active');
    });

    document.getElementById('btn-back-login').addEventListener('click', function () {
      panelFp.classList.remove('active');
      panelLogin.style.display = '';
      fpMsg.textContent = '';
      fpMsg.className = 'msg';
      fpForm.reset();
    });

    fpForm.addEventListener('submit', function (e) {
      e.preventDefault();
      fpMsg.textContent = '';
      fpMsg.className = 'msg';

      var email    = document.getElementById('fp-email').value.trim();
      var emailNorm = window.CourseAuth.normalizeEmail(email);
      var users    = window.CourseAuth.listUsers();
      var user     = users.find(function (u) {
        return (u.emailNorm || '') === emailNorm;
      });

      if (!user) {
        fpMsg.textContent = 'E-mail não encontrado. Verifique o endereço informado.';
        fpMsg.className = 'msg error';
        return;
      }

      // EmailJS configurado: envia por e-mail
      if (EMAILJS_PUBLIC_KEY !== 'SUA_PUBLIC_KEY') {
        fpBtn.disabled = true;
        fpBtn.textContent = 'Enviando...';
        emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
          to_email:      user.email,
          user_name:     user.username,
          user_password: user.password
        }).then(function () {
          fpMsg.textContent = 'Senha enviada para ' + user.email + '. Verifique sua caixa de entrada.';
          fpMsg.className = 'msg ok';
          fpBtn.disabled = false;
          fpBtn.textContent = 'Enviar senha por e-mail';
          fpForm.reset();
        }, function () {
          fpMsg.textContent = 'Erro ao enviar e-mail. Tente novamente.';
          fpMsg.className = 'msg error';
          fpBtn.disabled = false;
          fpBtn.textContent = 'Enviar senha por e-mail';
        });
      } else {
        // Fallback: exibe a senha na tela (EmailJS ainda não configurado)
        fpMsg.innerHTML = 'Sua senha é: <strong style="color:var(--teal);letter-spacing:1px">' +
          user.password + '</strong><br><span style="font-size:11px;color:var(--gray2)">Guarde-a em local seguro.</span>';
        fpMsg.className = 'msg ok';
      }
    });
  </script>
</body>
</html>
