<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALJ Cursos - Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#0D2137; --dark:#081929; --card:#112840;
  --teal:#00A99D; --amber:#F5A623; --white:#FFFFFF;
  --gray:#C8D6E0; --gray2:#7A9AB0; --red:#C0392B;
}
* { box-sizing:border-box; margin:0; padding:0; }
body {
  min-height:100vh;
  background: radial-gradient(ellipse at 15% 20%, rgba(0,169,157,0.18), transparent 50%),
              radial-gradient(ellipse at 85% 80%, rgba(245,166,35,0.12), transparent 55%),
              var(--dark);
  color:var(--white);
  font-family:'DM Sans',sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.panel {
  width:min(460px, 100%);
  background:var(--card);
  border:1px solid rgba(200,214,224,0.12);
  border-radius:14px;
  padding:28px;
  box-shadow:0 20px 50px rgba(0,0,0,0.35);
}
.badge {
  display:inline-block;
  font-size:11px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--teal);
  margin-bottom:14px;
}
h1 {
  font-family:'Syne',sans-serif;
  font-size:30px;
  line-height:1.1;
  margin-bottom:8px;
}
.subtitle {
  color:var(--gray);
  font-size:14px;
  margin-bottom:22px;
}
label {
  display:block;
  font-size:12px;
  color:var(--gray2);
  margin-bottom:6px;
  letter-spacing:.4px;
}
input {
  width:100%;
  background:#0B1D31;
  border:1px solid rgba(200,214,224,0.18);
  color:var(--white);
  border-radius:8px;
  padding:12px;
  margin-bottom:14px;
  outline:none;
}
input:focus { border-color:var(--teal); }
button {
  width:100%;
  border:none;
  border-radius:8px;
  padding:12px;
  background:var(--teal);
  color:var(--white);
  font-family:'Syne',sans-serif;
  font-size:14px;
  font-weight:700;
  cursor:pointer;
}
button:hover { background:#00c4b7; }
.msg {
  margin-top:12px;
  font-size:13px;
  min-height:18px;
}
.msg.error { color:#ff9c9c; }
.msg.ok { color:#93f0c4; }
.help {
  margin-top:16px;
  font-size:12px;
  color:var(--gray2);
  line-height:1.5;
}
.back {
  margin-top:14px;
  display:inline-block;
  color:var(--teal);
  text-decoration:none;
  font-size:13px;
}
</style>
</head>
<body>
  <div class="panel">
    <div class="badge">Acesso ao curso</div>
    <h1>Entrar na plataforma</h1>
    <p class="subtitle">Use seu e-mail e senha para acessar as aulas.</p>

    <form id="login-form">
      <label for="email">E-mail</label>
      <input id="email" type="email" autocomplete="email" required>

      <label for="password">Senha</label>
      <input id="password" type="password" autocomplete="current-password" required>

      <button type="submit">Entrar</button>
      <div id="msg" class="msg"></div>
    </form>

    <div class="help">Administrador inicial: admin@aljcursos.com.br</div>
    <a href="index-ifrs-19.html" class="back">Voltar para o índice</a>
  </div>

  <script src="auth.js"></script>
  <script>
    const form = document.getElementById('login-form');
    const msg = document.getElementById('msg');
    const params = new URLSearchParams(window.location.search);
    const returnUrl = params.get('returnUrl') || 'index-ifrs-19.html';
    const fromUrl = params.get('fromUrl');
    const backLink = document.querySelector('.back');
    let backTarget = fromUrl || returnUrl;
    if (!backTarget || /^aula\d+\.html(\?.*)?$/i.test(backTarget)) {
      backTarget = 'index-ifrs-19.html';
    }
    if (backLink) backLink.href = backTarget;

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      msg.textContent = '';
      msg.className = 'msg';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const result = window.CourseAuth.login(email, password);

      if (!result.ok) {
        msg.textContent = result.message;
        msg.className = 'msg error';
        return;
      }

      msg.textContent = 'Acesso liberado. Redirecionando...';
      msg.className = 'msg ok';
      setTimeout(function () {
        window.location.href = returnUrl;
      }, 300);
    });
  </script>
</body>
</html>
